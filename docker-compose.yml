services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - downloads:/data
      - ./cookies.txt:/cookies.txt
    environment:
      - YT_UI_COOKIES_PASSWORD=${YT_UI_COOKIES_PASSWORD}
      - YT_UI_COOKIES=/cookies.txt
      - DOWNLOAD_DIR=/data/downloads
      - YT_UI_STATE_DIR=/data/state
      - FLASK_HOST=0.0.0.0
      - YT_UI_FILE_TTL_DAYS=0.010417
      - YT_UI_JOB_TTL_SECONDS=14400
      - YT_UI_MAX_CONCURRENT=3
      - YT_UI_MAX_QUEUE=10
      - YT_UI_PER_IP_CONCURRENT=2
      - YT_UI_PER_IP_HOURLY=20
      - YT_UI_MAX_PLAYLIST_TRACKS=50
      - YT_UI_DISK_CAP_GB=20
      - YT_UI_PROXY=${YT_UI_PROXY}
      - YT_UI_SMTP_USER=${YT_UI_SMTP_USER}
      - YT_UI_SMTP_PASS=${YT_UI_SMTP_PASS}
      - YT_UI_ALERT_EMAIL=${YT_UI_ALERT_EMAIL}
    ports:
      - "${APP_PORT:-5055}:5055"

volumes:
  downloads:
