services:
  app:
    build: .
    restart: unless-stopped
    # Host networking so the app can reach the payment app on the host's
    # loopback (127.0.0.1:4001) directly — the payment app's internal API is
    # bound to localhost, and its public hostname sits behind Cloudflare which
    # blocks scripted requests.
    network_mode: host
    volumes:
      - downloads:/data
      - ./cookies.txt:/cookies.txt
      - ./desktop-builds:/data/desktop-builds
      - ./desktop-builds-trial:/data/desktop-builds-trial
    environment:
      - YT_UI_COOKIES_PASSWORD=${YT_UI_COOKIES_PASSWORD}
      - YT_UI_COOKIES=/cookies.txt
      - DOWNLOAD_DIR=/data/downloads
      - YT_UI_STATE_DIR=/data/state
      - FLASK_HOST=127.0.0.1
      - YT_UI_FILE_TTL_DAYS=0.010417
      - YT_UI_JOB_TTL_SECONDS=14400
      - YT_UI_MAX_CONCURRENT=3
      - YT_UI_MAX_QUEUE=10
      - YT_UI_PER_IP_CONCURRENT=2
      - YT_UI_PER_IP_HOURLY=20
      - YT_UI_MAX_PLAYLIST_TRACKS=50
      - YT_UI_DISK_CAP_GB=20
      - YT_UI_PROXY=${YT_UI_PROXY}
      - YT_UI_SMTP_USER=${YT_UI_SMTP_USER}
      - YT_UI_SMTP_PASS=${YT_UI_SMTP_PASS}
      - YT_UI_ALERT_EMAIL=${YT_UI_ALERT_EMAIL}
      - TOKEN_INTERNAL_SECRET=${TOKEN_INTERNAL_SECRET}
      - PAYMENT_APP_URL=${PAYMENT_APP_URL:-http://127.0.0.1:4001}
      - ACCESS_PAYMENT_URL=${ACCESS_PAYMENT_URL}
      - DESKTOP_BUILDS_DIR=/data/desktop-builds
      - DESKTOP_BUILDS_TRIAL_DIR=/data/desktop-builds-trial
      - KIT_API_KEY=${KIT_API_KEY}
      - KIT_TRIAL_TAG_ID=${KIT_TRIAL_TAG_ID}

volumes:
  downloads:
